# ================================================
# GitHub Actions: CI/CD Pipeline
# Build → Docker Image → Deploy to Digital Ocean
# ================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/vietair-app
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # =============================================
  # Job 1: Build & Test
  # =============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./Login
        run: mvn clean package -DskipTests -B

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: war-file
          path: Login/target/Login.war
          retention-days: 1

  # =============================================
  # Job 2: Build & Push Docker Image
  # Chi chay khi push vao main (khong phai PR)
  # =============================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Login
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

  # =============================================
  # Job 3: Deploy to Digital Ocean
  # =============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Digital Ocean via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_SERVER_IP }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            echo "=== Pulling latest image ==="
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "=== Stopping old container ==="
            docker stop vietair-app 2>/dev/null || true
            docker rm vietair-app 2>/dev/null || true

            echo "=== Starting new container ==="
            docker run -d \
              --name vietair-app \
              --restart unless-stopped \
              -p 80:8080 \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASS=${{ secrets.DB_PASS }} \
              ${{ env.DOCKER_IMAGE }}:latest

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Deploy complete! ==="
            docker ps | grep vietair-app
